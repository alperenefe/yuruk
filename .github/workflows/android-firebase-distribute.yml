# APK dagitimi — her push'ta DEGIL:
#   - commit mesajinda [apk] veya [dagit]  → push ile otomatik
#   - .\scripts\git-push.ps1 -Deploy       → push + workflow (GitHub UI yok)
#   - Actions → Run workflow               → elle (yedek)

name: Android Firebase Distribute

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Firebase release notlari (istege bagli)"
        required: false
        default: ""
  push:
    branches:
      - main

concurrency:
  group: android-firebase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-distribute:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (
        contains(github.event.head_commit.message, '[apk]') ||
        contains(github.event.head_commit.message, '[dagit]')
      ))
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: google-services.json (istege bagli)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          else
            echo "GOOGLE_SERVICES_JSON yok — build devam."
          fi

      - name: Release signing (optional secrets)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Keystore secret yok — debug imza ile devam."
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Version from pubspec + auto versionCode
        id: version
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: //' | tr -d ' ')
          VERSION_NAME="${VERSION_LINE%%+*}"
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "versionName=$VERSION_NAME  versionCode=${{ github.run_number }}"

      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-name="${{ steps.version.outputs.name }}" \
            --build-number="${{ steps.version.outputs.code }}"

      - name: Upload APK artifact (yedek)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      - name: Firebase App Distribution
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_TESTER_GROUPS: ${{ secrets.FIREBASE_TESTER_GROUPS }}
          FIREBASE_TESTER_EMAILS: ${{ secrets.FIREBASE_TESTER_EMAILS }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ] || [ -z "$FIREBASE_ANDROID_APP_ID" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_JSON ve FIREBASE_ANDROID_APP_ID secret'lari gerekli."
            echo "Kurulum: docs/CI_CD_FIREBASE.md"
            exit 1
          fi
          SA_FILE="${RUNNER_TEMP}/firebase-sa.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$SA_FILE"
          export GOOGLE_APPLICATION_CREDENTIALS="$SA_FILE"
          npm install -g firebase-tools@13
          if [ -n "${{ github.event.inputs.release_notes }}" ]; then
            NOTES="${{ github.event.inputs.release_notes }}"
          else
            NOTES="Build #${{ github.run_number }} — ${GITHUB_SHA::7}"
          fi
          ARGS=(
            appdistribution:distribute
            build/app/outputs/flutter-apk/app-release.apk
            --app "$FIREBASE_ANDROID_APP_ID"
            --release-notes "$NOTES"
          )
          if [ -n "$FIREBASE_TESTER_GROUPS" ]; then
            ARGS+=(--groups "$FIREBASE_TESTER_GROUPS")
          fi
          if [ -n "$FIREBASE_TESTER_EMAILS" ]; then
            ARGS+=(--testers "$FIREBASE_TESTER_EMAILS")
          fi
          if [ -z "$FIREBASE_TESTER_GROUPS" ] && [ -z "$FIREBASE_TESTER_EMAILS" ]; then
            echo "::error::FIREBASE_TESTER_GROUPS veya FIREBASE_TESTER_EMAILS secret'i gerekli."
            exit 1
          fi
          firebase "${ARGS[@]}"
